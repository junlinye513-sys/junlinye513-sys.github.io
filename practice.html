<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>題庫練習中心｜技術士檢定平台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --primary: #4A8FE7;
      --primary-dark: #2d6ac5;
      --bg: #f2f6fc;
      --radius: 18px;
    }

    /* 1. 導覽列：標準化統一高度 */
    .navbar {
      position: sticky;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      /* 與 guide 統一使用 12px 內距 */
      padding: 12px 0; 
    }

    .nav-container {
      max-width: 1000px;
      margin: auto;
      padding: 0 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      /* 關鍵：統一所有頁面的容器內容高度 */
      height: 27px; 
    }

    .nav-logo {
      font-weight: bold;
      color: var(--primary-dark);
      text-decoration: none;
      font-size: 18px;
      display: flex;
      align-items: center;
      line-height: 1;
    }

    .nav-menu {
      display: flex;
      gap: 20px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-menu a {
      text-decoration: none;
      color: #555;
      font-size: 15px;
      font-weight: 500;
      transition: 0.3s;
      line-height: 1;
    }

    .nav-menu a:hover {
      color: var(--primary);
    }

    /* 2. Body 與背景 */
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: "Microsoft JhengHei", system-ui, sans-serif;
      line-height: 1.8;
      color: #333;
    }

    /* 3. 內容區塊 */
    .content-box {
      max-width: 900px;
      margin: 30px auto 50px; /* 統一與 guide 接近的間距 */
      background: #fff;
      padding: 40px;
      border-radius: var(--radius);
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      border: 1px solid #eef2f8;
    }

    h1 { color: var(--primary-dark); text-align: center; margin-top: 0; font-size: 28px; }
    h2 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; color: var(--primary); margin-top: 20px; }

    /* 區塊顯示控制 */
    #info-section, #business-section { display: none; }

    .exam-item { 
      background: #f9fbff; 
      padding: 15px 20px; 
      margin: 12px 0; 
      border-radius: 8px; 
      border-left: 4px solid var(--primary); 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }

    .exam-info { display: flex; flex-direction: column; }
    .exam-name { font-weight: bold; color: #333; font-size: 1.05em; }
    .exam-details { font-size: 12px; color: #777; margin-top: 3px; }
    .version-tag { background: #e3f2fd; color: #1976d2; padding: 1px 6px; border-radius: 4px; font-weight: bold; margin-right: 5px; }

    .btn-go { background: var(--primary); color: #fff !important; padding: 8px 20px; text-decoration: none; border-radius: 8px; font-size: 14px; font-weight: bold; transition: 0.3s; }
    .btn-go:hover { background: var(--primary-dark); transform: scale(1.05); }

    .warning-box { background: #fff8e1; border: 1px solid #ffe082; padding: 15px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; }

    /* 返回連結：依要求改到靠左邊 */
    .back-home-container {
      text-align: left;
      margin-top: 40px;
    }
    .back-link { 
      display: inline-block; 
      color: #888; 
      text-decoration: none; 
      font-size: 15px; 
      transition: 0.3s;
    }
    .back-link:hover { color: var(--primary); }

    /* 4. 頁腳：統一與 guide 相同的樣式 */
    footer {
      text-align: center;
      padding: 40px 15px;
      font-size: 13px;
      color: #999;
      border-top: 1px solid #eee;
      background: #fff;
      margin-top: 50px;
    }

    footer a {
      text-decoration: none;
      color: #777;
      margin: 0 5px;
      transition: 0.3s;
    }

    footer a:hover {
      color: var(--primary);
    }

    /* 行動裝置優化 */
    @media (max-width: 600px) {
      .nav-menu {
        gap: 12px;
        overflow-x: auto;
        white-space: nowrap;
        padding-bottom: 5px;
      }
      .nav-container { height: auto; }
      .exam-item { flex-direction: column; text-align: center; gap: 12px; }
      .content-box { padding: 22px; margin: 20px 15px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">🎯 檢定練習站</a>
    <ul class="nav-menu">
      <li><a href="index.html">首頁</a></li>
      <li><a href="practice.html">題庫練習</a></li>
      <li><a href="guide.html">備考攻略</a></li>
      <li><a href="about.html">關於本站</a></li>
    </ul>
  </div>
</nav>
  
<div class="content-box">
  <h1 id="main-title">技術士學科題庫導覽</h1>
  
  <div class="warning-box">
    💡 <strong>115年度更新：</strong> 本站題庫均已同步至最新公告版次。請確認下方標註之<strong>版次編號</strong>，確保練習內容正確無誤。
  </div>

  <div id="info-section">
      <div class="exam-item">
        <div class="exam-info">
          <span class="exam-name">電腦軟體應用 丙級</span>
          <div class="exam-details"><span class="version-tag">版次 V114112414</span> 檔名：118003A14</div>
        </div>
        <a href="https://script.google.com/macros/s/AKfycbzJRPUuPygnC4dYRThkRlfIsVoEz12YFqDiu3h_YLv90ASUU0dLZnZ_x0c5Dj0-WFmu4A/exec" class="btn-go" target="_blank">開始練習</a>
      </div>
      </div>

  <div id="business-section">
      <div class="exam-item">
        <div class="exam-info">
          <span class="exam-name">會計事務 丙級</span>
          <div class="exam-details"><span class="version-tag">版次 V114042315</span> 檔名：149003A15</div>
        </div>
        <a href="https://script.google.com/macros/s/AKfycbzKghOORCB32SeSDb0vXoNEFdEm46NDhuvF6JpwCMwmddurFmnBRTNyrWzHpegJdFCJ/exec" class="btn-go" target="_blank">開始練習</a>
      </div>
      </div>

  <div class="back-home-container">
    <a href="index.html" class="back-link">← 返回首頁重新選擇</a>
  </div>
</div>

<footer>
  © 2026 技術士檢定學習平台<br><br>
  <a href="about.html">關於本站</a>｜<a href="privacy.html">隱私權政策</a>｜<a href="contact.html">聯絡我們</a>
</footer>

<script>
  function updateView() {
    const hash = window.location.hash;
    const infoSec = document.getElementById('info-section');
    const busSec = document.getElementById('business-section');
    const title = document.getElementById('main-title');

    if (hash === '#info') {
      infoSec.style.display = 'block';
      busSec.style.display = 'none';
      title.innerText = '資訊職類題庫專區';
    } else if (hash === '#business') {
      busSec.style.display = 'block';
      infoSec.style.display = 'none';
      title.innerText = '商業服務題庫專區';
    } else {
      infoSec.style.display = 'block';
      busSec.style.display = 'block';
    }
  }
  window.addEventListener('DOMContentLoaded', updateView);
  window.addEventListener('hashchange', updateView);
</script>

</body>
</html>
